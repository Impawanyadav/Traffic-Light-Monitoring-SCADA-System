<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Traffic Control | SCADA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-center mb-4">Traffic Light Monitoring System</h3>
        
        <div id="logout-message" class="alert alert-success d-none text-center" role="alert">
            You have successfully logged out.
        </div>

        <div id="error-message" class="alert alert-danger d-none text-center" role="alert">
            Invalid Admin ID or Password. Please try again.
        </div>
        
        <form action="/login" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Admin ID</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter Admin ID" required autocomplete="off">
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Secure Login</button>
        </form>
    </div>

    <script>
        const urlParams = window.location.search;

        // If URL has ?logout=true, show green banner
        if (urlParams.includes('logout=true')) {
            document.getElementById('logout-message').classList.remove('d-none');
        }

        // If URL has ?error=true, show red banner
        if (urlParams.includes('error=true')) {
            document.getElementById('error-message').classList.remove('d-none');
        }
    </script>

</body>
</html>
